<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>BINUS Schedule</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="app">

  <header>
    <div class="header-brand">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Schedule</span>
    </div>
    <div class="header-actions">
      <button id="btn-copy" class="action-btn" style="display:none" title="Copy as JSON" aria-label="Copy schedule as JSON">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span id="copy-text">JSON</span>
      </button>
      <button id="btn-ics" class="action-btn" style="display:none" title="Export as .ics" aria-label="Export schedule as ICS calendar file">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>ICS</span>
      </button>
    </div>
  </header>

  <!-- Loading -->
  <div id="view-loading" class="view center-view">
    <div class="loader"></div>
  </div>

  <!-- Empty / Wrong page -->
  <div id="view-empty" class="view center-view" style="display:none">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" class="empty-icon">
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.25"/>
      <line x1="12" y1="16" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="12" y1="8" x2="12.01" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <p class="empty-title">No schedule found</p>
    <p class="empty-sub">Open the <strong>My Schedule</strong> page on Binusmaya first.</p>
    <a href="https://lms.binus.ac.id/lms/schedule" target="_blank" class="link-btn">
      Open Binusmaya
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </a>
  </div>

  <!-- Error -->
  <div id="view-error" class="view center-view" style="display:none">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" class="empty-icon">
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.25"/>
      <line x1="15" y1="9" x2="9" y2="15" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="9" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
    </svg>
    <p class="empty-title">Something went wrong</p>
    <p id="error-message" class="empty-sub"></p>
    <button id="btn-retry" class="link-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Try again
    </button>
  </div>

  <!-- Schedule -->
  <div id="view-schedule" style="display:none">

    <div id="meta-bar">
      <span id="month-label"></span>
      <span id="count-label"></span>
    </div>

    <div id="filter-row">
      <button class="filter-btn active" data-type="online">
        <span class="filter-dot dot-online"></span>
        Online
      </button>
      <button class="filter-btn active" data-type="virtual-class">
        <span class="filter-dot dot-vc"></span>
        Virtual
      </button>
      <button class="filter-btn active" data-type="quiz">
        <span class="filter-dot dot-quiz"></span>
        Quiz
      </button>
      <button class="filter-btn active" data-type="exam">
        <span class="filter-dot dot-exam"></span>
        Exam
      </button>
    </div>

    <div id="list"></div>

  </div>

</div>
<script type="module" src="popup.js"></script>
</body>
</html>
